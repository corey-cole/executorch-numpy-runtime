[build-system]
requires = ["scikit-build-core>=0.10", "nanobind>=2.0"]
build-backend = "scikit_build_core.build"

[project]
name = "executorch-numpy-runtime"
version = "0.0.1"
description = "Torch-free numpy runtime for ExecuTorch .pte files (ExecuTorch 1.3.1, CPU)"
requires-python = ">=3.12"
dependencies = ["numpy>=1.24"]
authors = [
    { name = "Corey Cole", email = "3700879+corey-cole@users.noreply.github.com" }
]
readme = "README.md"
license = "Apache-2.0"
license-fils = ["LICENSE"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

[project.optional-dependencies]
bf16 = ["ml_dtypes>=0.3"]
test = ["pytest>=8"]

[tool.mypy]
plugins = ["numpy.typing.mypy_plugin"]

[tool.scikit-build]
wheel.py-api = "cp312"
cmake.version = ">=3.24"
build-dir = "build/{wheel_tag}"

[tool.scikit-build.cmake.define]
CMAKE_BUILD_TYPE = "Release"
