name: Quality Assurance Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Starting with a matrix even though it's only one entry as we expect to add more later
jobs:
  validate-native-shim:
    strategy:
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      
      - name: Install additional RPM dependencies
        run: |
          dnf install -y dnf-plugins-core
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf install -y -q gh
          gh --version
          TOOLSET_VER="$(gcc -dumpversion | cut -d. -f1)"
          dnf install -y -q "gcc-toolset-${TOOLSET_VER}-libasan-devel" || true
          dnf install -y -q "gcc-toolset-${TOOLSET_VER}-libtsan-devel" || true

      # Although not technically required, we want to verify that the runtime provenance is valid before we run
      # any tests to avoid useless test cycles   
      - name: Download ExecuTorch runtime library
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url="$(grep -oE 'https://[^"]*logging-${{ matrix.platform }}\.tar\.gz' cmake/RuntimePin.cmake | head -1)"
          test -n "${url}" || { echo "no logging URL in RuntimePin.cmake"; exit 1; }
          curl -fL -o runtime.tgz "${url}"
          gh attestation verify runtime.tgz --repo measly-java-learning/executorch-runtime-dist
          mkdir -p third_party
          tar -xzf runtime.tgz -C third_party

      - name: Generate add.pte
        run: |
          export PATH=/opt/python/cp312-cp312/bin:$PATH
          python -m pip install executorch==1.3.1 torch==2.12.0+cpu --extra-index-url https://download.pytorch.org/whl/cpu --quiet
          python tools/export_fixtures.py tests/models

      - name: Build + run leak harness
        run: |
          cmake -S native_tests -B build/leak && cmake --build build/leak
          ASAN_OPTIONS=detect_leaks=1 ./build/leak/leak_harness tests/models/add.pte 500

      # Race harness is problematic when running in a container on GitHub Actions
      # Will research and re-enable later
