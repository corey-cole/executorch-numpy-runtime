      #  run: |
      #    cmake -S native_tests -B build/race && cmake --build build/race --target race_harness
      #    setarch "$(uname -m)" -R \
      #        env TSAN_OPTIONS="suppressions=native_tests/tsan_suppressions.txt" \
      #        ./build/race/race_harness tests/models/add.pte 8 200
